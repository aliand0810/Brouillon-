<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marées Mayotte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); padding: 30px; max-width: 600px; width: 100%; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        .selectors { display: flex; gap: 15px; margin-bottom: 30px; }
        select { flex: 1; padding: 12px; border: 2px solid #667eea; border-radius: 8px; font-size: 16px; cursor: pointer; }
        select:focus { outline: none; border-color: #764ba2; }
        .resultat { background: #f8f9fa; border-radius: 10px; padding: 20px; }
        .date-title { font-size: 18px; font-weight: bold; color: #667eea; margin-bottom: 15px; text-align: center; }
        .maree-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #e0e0e0; }
        .maree-item:last-child { border-bottom: none; }
        .maree-type { font-weight: bold; color: #764ba2; }
        .maree-info { text-align: right; }
        .maree-heure { color: #333; }
        .maree-hauteur { color: #667eea; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌊 Marées de Mayotte</h1>
        
        <div class="selectors">
            <select id="citySelect">
                <option value="">Choisir une ville...</option>
                <option value="dzaoudzi">Dzaoudzi</option>
                <option value="mamoudzou">Mamoudzou</option>
                <option value="koungou">Koungou</option>
            </select>
            
            <select id="daySelect">
                <option value="">Choisir un jour...</option>
                <option value="21">21 Juin</option>
                <option value="22">22 Juin</option>
                <option value="23">23 Juin</option>
                <option value="24">24 Juin</option>
                <option value="25">25 Juin</option>
                <option value="26">26 Juin</option>
                <option value="27">27 Juin</option>
            </select>
        </div>

        <div class="resultat" id="resultat">
            <p style="text-align: center; color: #999;">Sélectionne une ville et un jour</p>
        </div>
    </div>

                25: { date: "Jeudi 25 juin", marees: [{type: "Marée Haute", time: "00h42", height: "2.56m"}, {type: "Marée Basse", time: "06h45", height: "1.36m"}, {type: "Marée Haute", time: "13h18", height: "2.99m"}, {type: "Marée Basse", time: "19h52", height: "1.32m"}]},

                27: { date: "Samedi 27 juin", marees: [{type: "Marée Haute", time: "02h52", height: "2.65m"}, {type: "Marée Basse", time: "08h43", height: "1.21m"}, {type: "Marée Haute", time: "15h00", height: "3.16m"}, {type: "Marée Basse", time: "21h32", height: "1.07m"}]}
            }
        };

        document.getElementById('citySelect').addEventListener('change', afficherMarees);
        document.getElementById('daySelect').addEventListener('change', afficherMarees);

        function afficherMarees() {
            const city = document.getElementById('citySelect').value;
            const day = document.getElementById('daySelect').value;
            const resultat = document.getElementById('resultat');

            if (!city || !day) {
                resultat.innerHTML = '<p style="text-align: center; color: #999;">Sélectionne une ville et un jour</p>';
                return;
            }

            const data = mareesData[city][day];
            let html = `<div class="date-title">${data.date} - ${city.charAt(0).toUpperCase() + city.slice(1)}</div>`;

            data.marees.forEach(m => {
                html += `
                    <div class="maree-item">
                        <span class="maree-type">${m.type}</span>
                        <div class="maree-info">
                            <div class="maree-heure">${m.time}</div>
                            <div class="maree-hauteur">${m.height}</div>
                        </div>
                    </div>
                `;
            });

            resultat.innerHTML = html;
        }
    </script>
</body>
</html>
